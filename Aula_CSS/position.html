<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }

        .section {
            margin-bottom: 60px;
        }

        .section h2 {
            background-color: #333;
            color: white;
            padding: 10px;
            margin-bottom: 20px;
        }

        .relative-container {
            position: relative;
            background-color: #e8f4f8;
            border: 2px solid #333;
            padding: 20px;
            height: 150px;
            margin-bottom: 20px;
        }

        .relative-box {
            position: relative;
            background-color: #3498db;
            color: white;
            padding: 10px;
            width: 150px;
            top: 20px;
            left: 30px;
            border-radius: 5px;
        }

        .absolute-container {
            position: relative;
            background-color: #fff3e0;
            border: 2px solid #333;
            padding: 20px;
            height: 200px;
            margin-bottom: 20px;
        }

        .absolute-box {
            position: absolute;
            background-color: #f44336;
            color: white;
            padding: 10px;
            width: 150px;
            top: 50px;
            right: 20px;
            border-radius: 5px;
        }

        .fixed-box {
            position: fixed;
            background-color: #4caf50;
            color: white;
            padding: 15px;
            width: 200px;
            top: 20px;
            right: 20px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="section">
            <h2>Relative</h2>
            <div class="relative-container">
                <div class="relative-box">
                    bla bla bla
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Absolute</h2>
            <div class="absolute-container">
                <div class="absolute-box">
                    bla bla bla
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Fixed</h2>
            <div class="content">
                bla bla bla
            </div>
        </div>
    </div>
</body>
</html>
