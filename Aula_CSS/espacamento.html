<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .controls { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 5px; }
        .controls h2 { margin-top: 0; color: #333; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100px; padding: 5px; margin-right: 10px; margin-bottom: 10px; }
        .elemento-container { margin: 20px 0; padding: 20px; background-color: #f9f9f9; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="controls">
        <h2>Padding</h2>
        <label for="padding-top">Padding Top</label>
        <input type="number" id="padding-top" value="10">

        <label for="padding-horizontal">Padding Horizontal</label>
        <input type="number" id="padding-horizontal" value="10">

        <label for="padding-bottom">Padding Bottom</label>
        <input type="number" id="padding-bottom" value="10">
    </div>

    <div class="controls">
        <h2>Margin</h2>
        <label for="margin-top">Margin Top</label>
        <input type="number" id="margin-top" value="0">

        <label for="margin-horizontal">Margin Horizontal</label>
        <input type="number" id="margin-horizontal" value="auto">

        <label for="margin-bottom">Margin Bottom</label>
        <input type="number" id="margin-bottom" value="0">
    </div>

    <div class="controls">
        <h2>Border</h2>
        <label for="border-width">Border Width</label>
        <input type="number" id="border-width" value="2">

        <label for="border-style">Border Style</label>
        <input type="text" id="border-style" value="solid">

        <label for="border-color">Border Color</label>
        <input type="text" id="border-color" value="aquamarine">
    </div>
</body>
</html>
